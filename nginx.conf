# =============================================================================
# Codelabz — Nginx Configuration for Production
# =============================================================================
# Serves the built Vite/React SPA with:
#   • SPA client-side routing  (try_files → /index.html)
#   • Gzip compression         (JS, CSS, HTML, JSON, SVG, fonts)
#   • Security headers         (X-Frame-Options, X-Content-Type-Options, etc.)
#   • Static asset caching     (1 year for hashed assets)
# =============================================================================

server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers ──────────────────────────────────────────────────
    # Note: These are set at the server level. Any `location` block that
    # uses its own `add_header` must re-include them (nginx behavior).
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── SPA routing ───────────────────────────────────────────────────────
    # For any route that doesn't match a physical file, serve index.html
    # so React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache hashed static assets ────────────────────────────────────────
    # Vite generates filenames with content hashes (e.g. assets/index-abc123.js)
    # so they can be cached aggressively.
    location /assets/ {
        expires    1y;
        add_header Cache-Control   "public, immutable";
        # Re-include security headers (overridden by add_header above)
        add_header X-Frame-Options        "SAMEORIGIN"       always;
        add_header X-Content-Type-Options "nosniff"           always;
        add_header X-XSS-Protection       "1; mode=block"    always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }

    # ── Disable caching for index.html ────────────────────────────────────
    # index.html references the hashed assets, so it must always be fresh.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
        # Re-include security headers (overridden by add_header above)
        add_header X-Frame-Options        "SAMEORIGIN"       always;
        add_header X-Content-Type-Options "nosniff"           always;
        add_header X-XSS-Protection       "1; mode=block"    always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }

    # ── Error pages ───────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

